<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Progreso Central — Acceso</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:        #111318;
      --surf:      #1c1f27;
      --surf-2:    #252931;
      --brd:       #2e3340;
      --gold:      #F5A623;
      --gold-dim:  #c4841b;
      --gold-bg:   rgba(245,166,35,0.08);
      --txt:       #F0EDE8;
      --muted:     #8a8f9e;
      --danger:    #e05555;
      --danger-bg: rgba(224,85,85,0.10);
      --radius:    10px;
      --trans:     .18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow: hidden;
    }

    /* ─── FONDO: PATRÓN DE ANDAMIO ───────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── TARJETA ─────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surf);
      border: 1px solid var(--brd);
      border-radius: var(--radius);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    /* ─── HEADER CON BARRA DIAGONAL ──────────────────────── */
    .card-header {
      position: relative;
      padding: 36px 36px 28px;
      background: var(--surf);
      overflow: hidden;
    }

    /* Firma visual: barra diagonal amarilla */
    .card-header::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -30px;
      width: 14px;
      height: 200px;
      background: var(--gold);
      transform: rotate(22deg);
      opacity: 0.9;
    }
    .card-header::after {
      content: '';
      position: absolute;
      top: -20px;
      right: -10px;
      width: 5px;
      height: 200px;
      background: var(--gold);
      transform: rotate(22deg);
      opacity: 0.4;
    }

    .brand-tag {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      opacity: 0.85;
    }

    .brand-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 38px;
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: 0.01em;
      color: var(--txt);
      text-transform: uppercase;
    }

    .brand-name span {
      color: var(--gold);
    }

    .brand-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ─── DIVISOR ─────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--brd);
      margin: 0 36px;
    }

    /* ─── FORMULARIO ──────────────────────────────────────── */
    .card-body {
      padding: 28px 36px 36px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color var(--trans);
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surf-2);
      border: 1px solid var(--brd);
      border-radius: 7px;
      color: var(--txt);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 12px 14px 12px 40px;
      outline: none;
      transition: border-color var(--trans), box-shadow var(--trans);
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
    }

    input[type="email"]:focus ~ svg,
    input[type="password"]:focus ~ svg {
      color: var(--gold);
    }

    input::placeholder { color: var(--muted); opacity: 0.6; }

    /* ─── BTN ─────────────────────────────────────────────── */
    .btn-ingresar {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: var(--gold);
      color: #111318;
      border: none;
      border-radius: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--trans), transform var(--trans), box-shadow var(--trans);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-ingresar:hover:not(:disabled) {
      background: #f0b040;
      box-shadow: 0 6px 20px rgba(245,166,35,0.3);
      transform: translateY(-1px);
    }

    .btn-ingresar:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-ingresar:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 17px;
      height: 17px;
      border: 2px solid rgba(17,19,24,0.3);
      border-top-color: #111318;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .btn-ingresar.loading .spinner { display: block; }
    .btn-ingresar.loading .btn-text { opacity: 0.7; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── MENSAJE DE ERROR ───────────────────────────────── */
    .msg-error {
      display: none;
      align-items: flex-start;
      gap: 9px;
      background: var(--danger-bg);
      border: 1px solid rgba(224,85,85,0.25);
      border-radius: 7px;
      padding: 11px 14px;
      margin-top: 16px;
      font-size: 13px;
      color: #e08888;
      line-height: 1.4;
    }

    .msg-error.visible { display: flex; }
    .msg-error svg { flex-shrink: 0; margin-top: 1px; }

    /* ─── FOOTER TARJETA ─────────────────────────────────── */
    .card-footer {
      padding: 14px 36px 18px;
      border-top: 1px solid var(--brd);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4caf7d;
      box-shadow: 0 0 0 2px rgba(76,175,125,0.2);
      animation: pulse 2.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(76,175,125,0.2); }
      50%       { box-shadow: 0 0 0 5px rgba(76,175,125,0.05); }
    }

    .status-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 480px) {
      .card-header  { padding: 28px 24px 22px; }
      .card-body    { padding: 22px 24px 28px; }
      .divider      { margin: 0 24px; }
      .card-footer  { padding: 12px 24px 16px; }
      .brand-name   { font-size: 30px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- HEADER -->
    <div class="card-header">
      <div class="brand-tag">Sistema de gestión</div>
      <div class="brand-name">El Progreso<br><span>Central</span></div>
      <div class="brand-sub">Andamios &amp; Formaletas</div>
    </div>

    <div class="divider"></div>

    <!-- FORMULARIO -->
    <div class="card-body">

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="usuario@empresa.com" autocomplete="username" />
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <button class="btn-ingresar" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-text">Ingresar</span>
      </button>

      <div class="msg-error" id="msgError">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="msgErrorText">Error de autenticación.</span>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="card-footer">
      <div class="status-dot"></div>
      <span class="status-label">Sistema en línea</span>
    </div>

  </div>

  <!-- ─── FIREBASE ──────────────────────────────────────────── -->
  <script type="module">
    import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
                                       from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc }
                                       from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ── CONFIGURACIÓN FIREBASE ── REEMPLAZAR CON TUS DATOS ──
    const firebaseConfig = {
      apiKey:            "TU_API_KEY",
      authDomain:        "TU_AUTH_DOMAIN",
      projectId:         "TU_PROJECT_ID",
      storageBucket:     "TU_STORAGE_BUCKET",
      messagingSenderId: "TU_MESSAGING_SENDER_ID",
      appId:             "TU_APP_ID"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── MAPA DE ROLES → PÁGINAS ──────────────────────────────
    const ROLE_REDIRECT = {
      admin:     "admin.html",
      bodega:    "bodega.html",
      conductor: "conductor.html"
    };

    // ── ELEMENTOS ────────────────────────────────────────────
    const emailInput    = document.getElementById("email");
    const passInput     = document.getElementById("password");
    const btnLogin      = document.getElementById("btnLogin");
    const msgError      = document.getElementById("msgError");
    const msgErrorText  = document.getElementById("msgErrorText");

    // ── UTILIDADES ───────────────────────────────────────────
    function setLoading(on) {
      btnLogin.disabled = on;
      btnLogin.classList.toggle("loading", on);
    }

    function showError(msg) {
      msgErrorText.textContent = msg;
      msgError.classList.add("visible");
    }

    function hideError() {
      msgError.classList.remove("visible");
    }

    function traducirError(code) {
      const map = {
        "auth/invalid-email":         "El correo no tiene un formato válido.",
        "auth/user-not-found":        "No existe una cuenta con ese correo.",
        "auth/wrong-password":        "Contraseña incorrecta. Intenta de nuevo.",
        "auth/invalid-credential":    "Credenciales incorrectas. Verifica correo y contraseña.",
        "auth/too-many-requests":     "Demasiados intentos fallidos. Espera un momento.",
        "auth/network-request-failed":"Sin conexión a Internet. Revisa tu red.",
        "auth/user-disabled":         "Esta cuenta fue deshabilitada. Contacta al administrador."
      };
      return map[code] || "Ocurrió un error inesperado. Intenta de nuevo.";
    }

    // ── REDIRIGIR SI YA ESTÁ AUTENTICADO ─────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await redirectByRole(user.uid);
      }
    });

    // ── LEER ROL Y REDIRIGIR ─────────────────────────────────
    async function redirectByRole(uid) {
      try {
        const snap = await getDoc(doc(db, "usuarios", uid));
        if (!snap.exists()) {
          showError("Tu usuario no tiene un perfil configurado. Contacta al administrador.");
          setLoading(false);
          return;
        }
        const { rol } = snap.data();
        const destino = ROLE_REDIRECT[rol];
        if (!destino) {
          showError(`Rol desconocido: "${rol}". Contacta al administrador.`);
          setLoading(false);
          return;
        }
        window.location.href = destino;
      } catch (err) {
        console.error("Error leyendo rol:", err);
        showError("No se pudo verificar el perfil. Intenta de nuevo.");
        setLoading(false);
      }
    }

    // ── LOGIN ────────────────────────────────────────────────
    async function handleLogin() {
      hideError();
      const email    = emailInput.value.trim();
      const password = passInput.value;

      if (!email || !password) {
        showError("Completa el correo y la contraseña para continuar.");
        return;
      }

      setLoading(true);

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        await redirectByRole(cred.user.uid);
      } catch (err) {
        console.error("Login error:", err);
        showError(traducirError(err.code));
        setLoading(false);
      }
    }

    btnLogin.addEventListener("click", handleLogin);

    // Enter en cualquier campo también dispara login
    [emailInput, passInput].forEach(el => {
      el.addEventListener("keydown", e => {
        if (e.key === "Enter") handleLogin();
      });
    });

  </script>
</body>
</html>
